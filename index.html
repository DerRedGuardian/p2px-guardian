<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>P2PxGuardian // Secure Communication Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #3f0c10; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #991b1b; }
        
        .glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .border-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.05); }

        body {
            background-color: #000000;
            background-image: linear-gradient(rgba(18, 10, 10, 0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(18, 10, 10, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        .cyber-scanner {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(180deg, transparent, rgba(239, 68, 68, 0.15), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: -1000;
        }

        @keyframes glitch {
            0% { text-shadow: 1px 1px 0 rgba(239, 68, 68, 0.6), -1px -1px 0 rgba(0,0,0,0.5); }
            50% { text-shadow: -1px 2px 0 rgba(239, 68, 68, 0.5), 1px -1px 0 rgba(239, 68, 68, 0.3); }
            100% { text-shadow: 2px -1px 0 rgba(239, 68, 68, 0.6), -2px 1px 0 rgba(0,0,0,0.5); }
        }
        .glitch-hover:hover { animation: glitch 0.25s steps(2) infinite; }
        
        @keyframes subtle-pulse { 0%, 100% { opacity: 0.8; box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); } 50% { opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); } }
        .status-pulse { animation: subtle-pulse 2s infinite; }
    </style>
</head>

            </div>
        </div>

        <div class="lg:col-span-5 bg-neutral-950/80 border border-red-950/60 rounded flex flex-col justify-between shadow-xl h-[85vh] lg:h-auto overflow-hidden relative border-glow backdrop-blur-sm">

                    <textarea id="chat-input" disabled rows="2" placeholder="[ LOCKED ]" class="flex-grow bg-neutral-950 border border-red-950/60 rounded px-3 py-2 text-xs focus:outline-none focus:border-red-900"></textarea>
                    <button id="btn-send" disabled type="submit" class="bg-red-950 hover:bg-red-900 text-red-200 border border-red-800 px-5 h-11 rounded text-xs font-bold uppercase tracking-widest">SEND</button>
