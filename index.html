<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2PxGuardian // Launch Node</title>
    <!-- Tailwind CSS für ein modernes, taktisches UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome für schicke Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
        /* Taktische Glüh-Effekte */
        .glow-red {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
        .border-glow {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.05);
        }

        /* Cyberpunk Grid-Hintergrund */
        body {
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(18, 10, 10, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 10, 10, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT Scanline-Simulation */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Animierte Scan-Linie */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .cyber-scanner {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(180deg, transparent, rgba(239, 68, 68, 0.15), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: -1000;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.05);
        }

        /* Glitch Animation für Überschriften */
        @keyframes glitch {
            0% { text-shadow: 1px 1px 0 rgba(239, 68, 68, 0.6), -1px -1px 0 rgba(0,0,0,0.5); }
            50% { text-shadow: -1px 2px 0 rgba(239, 68, 68, 0.5), 1px -1px 0 rgba(239, 68, 68, 0.3); }
            100% { text-shadow: 2px -1px 0 rgba(239, 68, 68, 0.6), -2px 1px 0 rgba(0,0,0,0.5); }
        }
        .glitch-hover:hover {
            animation: glitch 0.25s steps(2) infinite;
        }

        /* Pulsierende Statusanzeige */
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.8; box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        }
        .status-pulse {
            animation: subtle-pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-black text-neutral-200 min-h-screen flex flex-col justify-between font-mono antialiased selection:bg-red-950/50 selection:text-red-400">

    <!-- Animierte Scan-Linie im Hintergrund -->
    <div class="cyber-scanner"></div>

    <!-- Header -->
    <header class="bg-neutral-950/90 border-b border-red-950/60 p-4 shadow-2xl sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <span class="flex h-2.5 w-2.5 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600"></span>
                </span>
                <h1 class="text-md font-bold tracking-widest text-neutral-100 uppercase cursor-pointer glitch-hover transition duration-350">
                    <span class="text-red-500 font-black">P2PxGUARDIAN</span> <span class="text-neutral-500">//</span> Launch NODE <span class="text-xs font-mono px-2 py-0.5 rounded bg-neutral-900 border border-red-950/50 text-red-400">v1.0</span>
                </h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <div id="ping-display" class="text-xs font-mono text-red-400 bg-red-950/20 px-2.5 py-1 rounded border border-red-950/40"></div>
                <div class="flex items-center gap-2 bg-neutral-900 px-3 py-1.5 rounded border border-red-950/30 status-pulse">
                    <span id="connection-status" class="inline-block w-2 h-2 rounded-full bg-gray-600"></span>
                    <span id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-neutral-400">Off</span>
                </div>
            </div>
        </div>
    </header>

    <!-- HTTPS Warning Banner -->
    <div id="https-warning" class="hidden bg-red-950/30 border-b border-red-900/30 text-red-300 px-4 py-3 text-xs text-center">
        <div class="max-w-6xl mx-auto flex items-center justify-center gap-2">
            <i class="fa-solid fa-triangle-exclamation text-red-500 text-sm"></i>
            <span><strong>SECURITY ALERT:</strong> Da diese Verbindung nicht über <strong>HTTPS</strong> geladen wurde, blockiert der Browser den Mikrofonzugriff sowie native Krypto-Funktionen. Sprachverbindung deaktiviert, Fallback-Kryptographie aktiv.</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow max-w-6xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        
        <!-- Left Side: Wizard & Diagnostics (7 Cols) -->
        <div class="lg:col-span-7 flex flex-col gap-4 overflow-y-auto max-h-[85vh] pr-1">
            
            <!-- Setup Card -->
            <div class="bg-neutral-950/80 border border-red-950/60 rounded p-5 shadow-xl space-y-5 border-glow backdrop-blur-sm">
                <h2 class="text-xs font-bold uppercase tracking-widest text-red-500 border-b border-red-950/40 pb-3 flex items-center justify-between">
                    <span>■ 0. Launch</span>
                    <span class="text-[9px] text-neutral-500">Launching CHANNEL</span>
                </h2>

                <!-- Launch Node -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider">PROTOKOLL-Launch:</label>
                    <div class="grid grid-cols-2 gap-3">
                      <a href="P2PxGuardian.html">
                        <button id="btn-role-host" class="bg-neutral-900/60 hover:bg-neutral-850 text-neutral-300 py-3 px-4 rounded text-xs font-bold tracking-widest uppercase border border-red-950/40 hover:border-red-600 transition duration-150;">
                            Launch P2PxGuardian
                        </button>
                      </a>
                    </div>
                </div>



    <!-- Logic -->
    <script>
        
    </script>
</body>
</html>
